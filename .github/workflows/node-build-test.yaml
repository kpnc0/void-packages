name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    container:
      image: ghcr.io/void-linux/void-musl-full
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git nodejs
          useradd -G xbuilder -M builder

      - name: Checkout
        uses: classabbyamp/treeless-checkout-action@v1

      - name: Prepare masterdir
        run: |
          chown -R builder:builder .
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build nodejs
        run: |
          sudo -Eu builder ./xbps-src pkg nodejs

      - name: Find and set XBPS package path
        id: verify_xbps
        run: |
          XBPS_FILE=$(find hostdir/binpkgs -name "nodejs-*.xbps" | head -n 1)
          if [ -z "$XBPS_FILE" ]; then
            echo "No nodejs xbps package found!"
            exit 1
          fi
          echo "xbps_path=$XBPS_FILE" >> $GITHUB_OUTPUT
          echo "Found XBPS package at: $XBPS_FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: ${{ steps.verify_xbps.outputs.xbps_path }}

      - name: Attach XBPS package to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.verify_xbps.outputs.xbps_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
