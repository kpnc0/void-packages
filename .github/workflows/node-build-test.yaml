name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build nodejs (all in one step)
        run: |
          # Install static xbps tools
          curl -L -o xbps-static.tar.xz https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz
          sudo tar -xJf xbps-static.tar.xz -C /usr/local --strip-components=1
          export PATH="/usr/local/bin:$PATH"
          
          # Verify xbps tools work
          xbps-uhelper --version
          
          # Bootstrap and build
          ./xbps-src binary-bootstrap
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps