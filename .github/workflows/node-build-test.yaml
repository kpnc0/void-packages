name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code on host
        uses: actions/checkout@v4

      - name: Find non-root user in container
        run: |
          docker run --rm ghcr.io/void-linux/void-buildroot-musl:latest cat /etc/passwd

      - name: Build in Void container with detected user
        run: |
          # Use UID 1000 which is common for first user
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            --user 1000:1000 \
            ghcr.io/void-linux/void-buildroot-musl:latest \
            /bin/bash -c "
              ./xbps-src binary-bootstrap
              ./xbps-src pkg nodejs
            "

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps