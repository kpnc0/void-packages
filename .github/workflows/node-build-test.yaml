name: Test Node.js musl build

on:
  push:
    branches: [nodejs-update, test]
  workflow_dispatch:

jobs:
  build-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Void Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xz-utils
          # Download and set up Void's xbps-src requirements
          curl -s https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz | sudo tar -xJ -C /usr/local

      - name: Bootstrap and build
        run: |
          ./xbps-src binary-bootstrap
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-x86_64-musl
          path: hostdir/binpkgs/nodejs-*.xbps