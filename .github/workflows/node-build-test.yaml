name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-buildroot-musl:latest
      options: --user root
    steps:
      - name: Install git (missing in the container)
        run: xbps-install -Sy git

      - uses: actions/checkout@v4
        with:
          # Use the container's git, not the runner's
          set-safe-directory: false

      - name: Bootstrap and build
        run: |
          ./xbps-src binary-bootstrap
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps