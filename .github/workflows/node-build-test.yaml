name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xbps static tools and proot
        run: |
          curl -L -o xbps-static.tar.xz https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz
          sudo tar -xJf xbps-static.tar.xz -C /
          sudo apt-get update
          sudo apt-get install -y proot

      - name: Bootstrap and build
        run: |
          ./xbps-src -m proot binary-bootstrap
          ./xbps-src -m proot pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps