name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies for xbps-src
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc libc-dev curl

      - name: Bootstrap Void build environment
        run: |
          ./xbps-src binary-bootstrap

      - name: Build nodejs
        run: |
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps