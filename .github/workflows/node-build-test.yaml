name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install xbps and git
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl
          curl -L -o xbps-static.tar.xz https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz
          sudo tar -xJf xbps-static.tar.xz -C /usr/local --strip-components=1
          sudo ln -sf /usr/local/bin/xbps-* /usr/bin/ || true

      - name: Checkout code manually
        run: |
          git clone https://github.com/kpnc0/void-packages.git .
          git checkout node-compile-test

      - name: Bootstrap Void build environment
        run: |
          ./xbps-src binary-bootstrap

      - name: Build nodejs
        run: |
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps