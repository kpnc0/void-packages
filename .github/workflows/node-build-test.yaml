name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install xbps static tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -L -o xbps-static.tar.xz https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz
          sudo tar -xJf xbps-static.tar.xz -C /usr/local --strip-components=1
          # Create a wrapper script for xbps-src to find them
          sudo mkdir -p /opt/xbps/bin
          sudo ln -sf /usr/local/bin/xbps-* /opt/xbps/bin/
          export PATH="/opt/xbps/bin:$PATH"
          echo "PATH=/opt/xbps/bin:$PATH" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Void build environment
        run: |
          ./xbps-src binary-bootstrap

      - name: Build nodejs
        run: |
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps