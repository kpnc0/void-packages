name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code on host
        uses: actions/checkout@v4

      - name: Build in Void container as root with XBPS_ALLOW_ROOT
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            --user root \
            -e XBPS_ALLOW_ROOT=1 \
            ghcr.io/void-linux/void-buildroot-musl:latest \
            /bin/bash -c "
              ./xbps-src binary-bootstrap
              ./xbps-src pkg nodejs
            "

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps