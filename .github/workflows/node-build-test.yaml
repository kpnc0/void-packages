name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-musl-full
      # needed for prepare.sh (to run chroot operations)
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      # 1. Prepare container (mirrors, deps, non‑root user) install nodejs
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git nodejs
          useradd -G xbuilder -M builder

      # 2. Checkout code (works inside container, no Node.js needed)
      - name: Checkout
        uses: classabbyamp/treeless-checkout-action@v1

      # 3. Prepare xbps-src masterdir (as builder)
      - name: Prepare masterdir
        run: |
          chown -R builder:builder .
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          # fetch-xtools is optional; only needed for some advanced features
          common/travis/fetch-xtools.sh

      # 4. Build nodejs (as builder)
      - name: Build nodejs
        run: |
          sudo -Eu builder ./xbps-src pkg nodejs

      # 5. Find and set the XBPS package path
      - name: Find and set XBPS package path
        id: verify_xbps
        run: |
          XBPS_FILE=$(find hostdir/binpkgs -name "nodejs-*.xbps" | head -n 1)
          if [ -z "$XBPS_FILE" ]; then
            echo "No nodejs xbps package found!"
            exit 1
          fi
          echo "xbps_path=$XBPS_FILE" >> $GITHUB_OUTPUT
          echo "Found XBPS package at: $XBPS_FILE"

      # 6. Upload artifact (always runs, for workflow debugging)
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: xbps-binary
          path: hostdir/binpkgs/nodejs-devel-26.3.0_1.x86_64-musl.xbps

      # 7. Attach to GitHub Release (only runs on release events)
      - name: Attach XBPS package to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.verify_xbps.outputs.xbps_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
