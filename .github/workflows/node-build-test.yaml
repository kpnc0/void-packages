name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-linux:latest-musl
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap and build
        run: |
          ./xbps-src binary-bootstrap
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps