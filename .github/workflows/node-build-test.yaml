name: Build nodejs on musl

on:
  push:
    branches:
      - node-compile-test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xbps static tools
        run: |
          # Download static xbps binaries for musl
          curl -L -o xbps-static.tar.xz https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz
          sudo tar -xJf xbps-static.tar.xz -C /usr/local --strip-components=1
          # Verify installation
          xbps-uhelper --version

      - name: Bootstrap Void build environment
        run: |
          # Create masterdir (needs to run as non-root; xbps-src will use uchroot/unshare)
          ./xbps-src binary-bootstrap

      - name: Build nodejs
        run: |
          ./xbps-src pkg nodejs

      - name: Upload binary package
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-musl
          path: hostdir/binpkgs/nodejs-*.xbps